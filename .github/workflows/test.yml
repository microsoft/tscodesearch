name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Job 1: full native test suite ──────────────────────────────────────────
  # Downloads Typesense, creates a venv, and runs all 686 tests.
  native:
    name: Native tests
    runs-on: ubuntu-latest

    env:
      TYPESENSE_VERSION: "27.1"
      TYPESENSE_API_KEY: ci-test-key
      TYPESENSE_PORT: 8108

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run native tests
        run: bash ci-test.sh --no-docker

      - name: Upload Typesense log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typesense-log
          path: /tmp/typesense-ci/typesense.log

  # ── Job 2: Docker E2E ───────────────────────────────────────────────────────
  # Builds the codesearch-mcp image, starts a container with sample/root1 and
  # sample/root2 mounted, waits for indexing to complete, then runs the 52
  # test_sample_e2e.py tests and the VS Code extension pipeline tests against
  # the live container.
  docker-e2e:
    name: Docker E2E tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python venv
        run: |
          python3 -m venv /tmp/e2e-venv
          /tmp/e2e-venv/bin/pip install -q -r requirements-dev.txt

      - name: Run Docker E2E tests (Python + VS Code extension)
        run: PYTEST=/tmp/e2e-venv/bin/pytest bash run_tests.sh --docker

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker ps -a
          for id in $(docker ps -aq); do
            echo "=== logs for $id ==="
            docker logs --tail 60 "$id" 2>&1 || true
          done
